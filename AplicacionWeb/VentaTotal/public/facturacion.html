<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facturacion - Lista de Ventas</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/facturacion.css">
</head>
<body>
<div class="page">
    <div class="header">
        <div>
            <h1>Interfaz de Facturacion</h1>
            <p>Selecciona una venta para llenar sus datos de facturacion.</p>
        </div>
        <div class="nav-actions">
            <a class="btn back" href="ventas-lista.html"><i class="fa-solid fa-arrow-left"></i>Volver a ventas</a>
            <button id="btnRecargar" class="btn primary" type="button"><i class="fa-solid fa-rotate"></i>Recargar</button>
        </div>
    </div>

    <section class="card">
        <div class="toolbar">
            <div class="field">
                <label for="buscarVenta">Buscar venta</label>
                <input id="buscarVenta" type="text" placeholder="Folio o cliente">
            </div>
            <div class="field">
                <label for="estadoVenta">Estado</label>
                <select id="estadoVenta">
                    <option value="">Todos</option>
                    <option value="completada">Completada</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="cancelada">Cancelada</option>
                </select>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Folio</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Metodo</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Accion</th>
                    </tr>
                </thead>
                <tbody id="tablaFacturacionBody">
                    <tr>
                        <td class="estado" colspan="7">Cargando ventas...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <p id="resumen" class="footer-note">0 ventas disponibles para facturacion.</p>
    </section>
</div>

<script src="js/facturacion-lista.js"></script>
</body>
</html>
