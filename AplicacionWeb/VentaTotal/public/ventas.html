<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punto de Venta</title>

<link rel="stylesheet" href="css/ventas.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">

<div class="logo">
<div class="logo-icon">
<i class="fa-solid fa-table-cells-large"></i>
</div>

<div>
<h3>Sistema ERP</h3>
<p>Versión 1.0</p>
</div>
</div>

<nav>

<a class="menu" href="dashboard.html">
<i class="fa-solid fa-table-cells-large"></i>
<span>Dashboard</span>
</a>

<a class="menu" href="productos.html">
<i class="fa-solid fa-box"></i>
<span>Productos</span>
</a>

<a class="menu" href="entradas.html">
<i class="fa-solid fa-arrow-down"></i>
<span>Entradas</span>
</a>

<a class="menu active" href="ventas.html">
<i class="fa-solid fa-cart-shopping"></i>
<span>Ventas</span>
</a>

<a class="menu" href="reportes.html">
<i class="fa-solid fa-chart-column"></i>
<span>Reportes</span>
</a>

<a class="menu" href="usuarios.html">
<i class="fa-solid fa-users"></i>
<span>Usuarios</span>
</a>

</nav>

</aside>


<!-- MAIN -->
<main class="main">

<header class="topbar">

<h1>VentaTotal</h1>



<div class="profile">

<div class="avatar">
<i class="fa-regular fa-user"></i>
</div>

<div>
<h4 id="topbarUsuarioNombre">Cargando...</h4>
<p id="topbarUsuarioRol">Administrador</p>
</div>

</div>

</header>


<div class="content">

<div class="page-header">
<h2>Punto de Venta</h2>
<p>Registra tus ventas de forma rápida y eficiente</p>
</div>


<div class="ventas-layout">

<!-- PRODUCTOS -->
<div class="productos">

<div class="filtros">

<div class="buscar">
<i class="fa-solid fa-magnifying-glass"></i>
<input type="text" id="buscarProducto" placeholder="Buscar producto por nombre o código...">
</div>

<select id="filtroCategoria">
<option value="">Todas las Categorías</option>
</select>

</div>


<div class="productos-grid" id="productosGrid">
<p class="estado" id="estadoProductos">Cargando productos...</p>
</div>

</div>


<!-- CARRITO -->
<div class="carrito">

<div class="carrito-header">
<h3><i class="fa-solid fa-cart-shopping"></i> Carrito de Compra</h3>
<span class="badge" id="badgeCantidad">0</span>
</div>

<div class="carrito-items" id="carritoItems">
<div class="carrito-vacio">
<i class="fa-solid fa-cart-shopping"></i>
<p>El carrito está vacío</p>
</div>
</div>


<div class="totales">

<div>
<span>Subtotal:</span>
<span id="subtotal">$0.00</span>
</div>

<div>
<span>IVA (16%):</span>
<span id="iva">$0.00</span>
</div>

<hr>

<div class="total">
<span>Total:</span>
<span id="total">$0.00</span>
</div>

</div>

<div class="pago">

<label>Método de Pago</label>

<select class="metodo" id="metodoPago">
<option value="efectivo">💵 Efectivo</option>
<option value="tarjeta">💳 Tarjeta</option>
<option value="transferencia">🏦 Transferencia</option>
</select>

<label>Cliente (opcional)</label>
<input type="text" id="clienteVenta" placeholder="Nombre del cliente">

<label>Observaciones</label>
<textarea id="observacionesVenta" rows="3" placeholder="Notas de la venta"></textarea>

<button class="btn-confirmar" id="btnConfirmarVenta">
<i class="fa-solid fa-dollar-sign"></i>
Confirmar Venta
</button>

<button class="btn-cancelar" id="btnCancelarVenta">
Cancelar
</button>

<p class="mensaje" id="mensajeVenta"></p>

</div>


</div>

</div>

</div>

</main>

</div>

<script src="js/ventas.js"></script>
</body>
</html>
